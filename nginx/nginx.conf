worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Límites de tamaño de cuerpo (PDFs de manifiestos)
    client_max_body_size 15M;

    # Ocultar versión de nginx
    server_tokens off;

    upstream backend  { server backend:8080;  keepalive 32; }
    upstream frontend { server frontend:3000; keepalive 16; }

    server {
        listen 80;
        server_name _;

        # ── Cabeceras de seguridad (OWASP) ─────────────────────────
        add_header X-Frame-Options          "SAMEORIGIN"                   always;
        add_header X-Content-Type-Options   "nosniff"                      always;
        add_header X-XSS-Protection         "1; mode=block"                always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;

        # ── WebSocket STOMP ─────────────────────────────────────────
        location /ws-stomp {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout 3600s;
        }

        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout 3600s;
        }

        # ── API backend ─────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # Rate limit básico para la API
            limit_req zone=api burst=20 nodelay;
        }

        # Actuator health (solo este, el resto no expuesto)
        location /actuator/health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # ── Frontend Next.js ────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Archivos estáticos Next.js con caché larga
        location /_next/static/ {
            proxy_pass http://frontend;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, immutable, max-age=31536000";
        }
    }

    # Rate limiting: 30 req/s por IP para la API
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
}
