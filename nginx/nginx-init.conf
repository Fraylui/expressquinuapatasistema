# Configuración temporal HTTP-only para obtener el certificado Let's Encrypt
# Solo se usa durante init-ssl.sh — NO es la config de producción

worker_processes 1;

events { worker_connections 512; }

http {
    server_tokens off;

    server {
        listen 80;
        server_name _;

        # ACME challenge — certbot deposita el token aquí
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location / {
            return 200 'Express Quinuapata — Configurando SSL, vuelva en un momento.';
            add_header Content-Type text/plain;
        }
    }
}
