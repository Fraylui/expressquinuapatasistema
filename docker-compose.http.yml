services:
  nginx:
    image: nginx:1.25-alpine
    container_name: expressvraem_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    networks:
      - express-pdn-network
    deploy:
      resources:
        limits:
          memory: 64M
