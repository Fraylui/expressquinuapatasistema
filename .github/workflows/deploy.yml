name: Deploy a Contabo

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite lanzarlo a mano desde la pestaña Actions

# Nunca dos deploys a la vez; si llegan varios pushes seguidos, solo corre el último
concurrency:
  group: deploy-produccion
  cancel-in-progress: false

jobs:
  deploy:
    name: Desplegar en el servidor
    runs-on: ubuntu-latest

    steps:
      - name: Deploy por SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 5.189.128.214
          username: root
          key: ${{ secrets.CONTABO_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /opt/expressvraem
            git fetch origin main
            git reset --hard origin/main
            bash scripts/deploy-server.sh
