spring.application.name=express-vraem-backend

# DataSource
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Response compression
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript,text/plain
server.compression.min-response-size=1024

# Spring Cache — Caffeine
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# WebSocket
spring.websocket.allowed-origins=${ALLOWED_ORIGINS}

# Actuator — solo health pública; metrics e info requieren autenticación
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
# El SMTP es opcional (emails de bienvenida): sin MAIL_HOST el indicador de mail
# dejaba el health en DOWN, y Docker usa este check para reiniciar el contenedor
management.health.mail.enabled=false

# URLs configurables para QR codes en PDFs
app.verificacion.url=https://expressvraem.pe/verificar/
app.tracking.url=https://expressvraem.pe/tracking/
app.control.url=https://expressvraem.pe/control/

# Logging
logging.level.com.expressvraem=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Email (optional — if MAIL_HOST not set, credential emails are skipped)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_TLS:true}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Jackson
spring.jackson.time-zone=America/Lima
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.serialization.write-dates-as-timestamps=false
