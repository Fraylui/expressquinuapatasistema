# Testcontainers sobrescribe la URL de DB automáticamente via @DynamicPropertySource
# Estos valores son placeholders; el test los reemplaza con los del contenedor real
spring.datasource.url=jdbc:postgresql://localhost:5432/test_db
spring.datasource.username=test
spring.datasource.password=test
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

jwt.secret=test-secret-key-muy-larga-para-que-pase-validacion-minima-512-bits-ABCDEFGHIJKLMN
jwt.expiration=3600000

spring.websocket.allowed-origins=http://localhost:3000

management.endpoints.web.exposure.include=health
logging.level.com.expressvraem=WARN
logging.level.org.springframework.security=WARN
logging.level.org.testcontainers=WARN
