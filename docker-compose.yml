services:

  postgres:
    image: postgres:15-alpine
    container_name: expressvraem_postgres
    restart: always
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_pdn_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seeds/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    networks:
      - express-pdn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: expressvraem-backend:latest
    container_name: expressvraem_backend
    restart: always
    environment:
      DB_URL:                 jdbc:postgresql://postgres:5432/${DB_NAME}
      DB_USER:                ${DB_USER}
      DB_PASSWORD:            ${DB_PASSWORD}
      JWT_SECRET:             ${JWT_SECRET}
      JWT_EXPIRATION:         ${JWT_EXPIRATION:-86400000}
      ALLOWED_ORIGINS:        ${ALLOWED_ORIGINS}
      SPRING_PROFILES_ACTIVE: prod
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - express-pdn-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 896M
        reservations:
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL:  ${NEXT_PUBLIC_WS_URL}
    image: expressvraem-frontend:latest
    container_name: expressvraem_frontend
    restart: always
    environment:
      NODE_ENV: production
    networks:
      - express-pdn-network
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: expressvraem-nginx:latest
    container_name: expressvraem_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "8081:8081"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      # Página web pública (repo PaginaWebExpressQuinuapata clonado en el servidor)
      - /opt/paginaweb:/var/www/web:ro
    depends_on:
      - frontend
    networks:
      - express-pdn-network
    healthcheck:
      # 127.0.0.1 (no localhost: nginx solo escucha IPv4). Prueba https (modo SSL)
      # y cae a http (modo inicial sin certificado).
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1/actuator/health 2>/dev/null | grep -q UP || wget -qO- http://127.0.0.1/actuator/health 2>/dev/null | grep -q UP || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M

  backup:
    image: postgres:15-alpine
    container_name: expressvraem_backup
    restart: always
    environment:
      PGPASSWORD:              ${DB_PASSWORD}
      DB_NAME:                 ${DB_NAME}
      DB_USER:                 ${DB_USER}
      BACKUP_RETENTION_DAYS:   ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ./backups:/backups
      - ./scripts/backup-docker.sh:/backup.sh:ro
    networks:
      - express-pdn-network
    entrypoint: >
      sh -c "cp /backup.sh /usr/local/bin/backup.sh &&
             chmod +x /usr/local/bin/backup.sh &&
             echo '0 2 * * * /usr/local/bin/backup.sh >> /var/log/backup.log 2>&1' | crontab - &&
             crond -f -l 8"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M

  certbot:
    image: certbot/certbot:latest
    container_name: expressvraem_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --quiet --webroot --webroot-path=/var/www/certbot;
          sleep 12h & wait $${!};
        done"
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_pdn_data:
  certbot_conf:
  certbot_www:

networks:
  express-pdn-network:
    driver: bridge
